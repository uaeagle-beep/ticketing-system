# nginx config for the `web` service (ADR-0005):
#  - serves the compiled SPA from /usr/share/nginx/html on port 80
#  - reverse-proxies /api/* to the API container (http://api:8080) so the
#    browser is single-origin (no CORS in the common path)
#  - SPA history fallback: unknown paths serve /index.html so client-side
#    routing (react-router) works on deep links / refresh

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (SCT-003) ---
    # Declared at the server level so they apply to the SPA (index.html), the
    # history-fallback location, and proxied responses. The `always` flag emits
    # them on error responses too (e.g. 404/5xx), not just 2xx/3xx.
    #
    # IMPORTANT nginx inheritance rule: add_header directives are NOT inherited
    # into a `location` that defines its OWN add_header. The /assets/ location
    # sets Cache-Control, so it must repeat these headers (see below) or it would
    # serve fingerprinted JS/CSS with no CSP. Every other location inherits these.
    #
    # CSP chosen to NOT break the SPA:
    #   default-src 'self'            — same-origin only baseline
    #   connect-src 'self'            — XHR/fetch to the same origin (API via nginx)
    #   img-src 'self' data:          — bundled images + data: URIs
    #   script-src 'self'             — only bundled JS (no inline scripts in build)
    #   style-src 'self' 'unsafe-inline' — bundled CSS + React inline style props
    #   frame-ancestors 'none'        — clickjacking protection (pairs with XFO)
    #   base-uri 'self'; object-src 'none'
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Reverse-proxy the API. The trailing slashes keep the /api prefix intact:
    # a request to /api/teams is forwarded to http://api:8080/api/teams.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass the Authorization (bearer) header through to the API.
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    # Optionally expose backend health endpoints through the same origin.
    location /health/ {
        proxy_pass http://api:8080/health/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Long-cache fingerprinted build assets.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # This location defines its own add_header (Cache-Control), so per nginx's
        # inheritance rule the server-level security headers are NOT inherited here
        # and must be repeated, otherwise the bundled JS/CSS would ship with no CSP.
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # SPA fallback: serve index.html for any non-file route so deep links and
    # browser refresh resolve to the client-side router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
