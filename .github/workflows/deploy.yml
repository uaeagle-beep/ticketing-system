name: Deploy

# Auto-deploy to the production Docker Compose stack after CI passes on main.
#
# WHY a self-hosted runner: the prod server is on a private LAN (192.168.0.99),
# unreachable from GitHub-hosted runners. A self-hosted runner installed ON the
# server makes only OUTBOUND connections to GitHub (no inbound ports to open) and
# runs the deploy locally as the `hp` user (a member of the `docker` group).
#
# GATING: triggered via workflow_run so it runs ONLY when the "CI" workflow
# (backend + frontend-unit + e2e) has completed successfully on main. Also
# dispatchable manually (workflow_dispatch).
#
# SECURITY (public repo + self-hosted runner): this workflow NEVER runs on
# pull_request events, so fork PRs cannot execute on the runner. Keep it that way.
# Prefer a PRIVATE repo, and in repo Settings -> Actions restrict "Fork pull
# request workflows" so forks can't reach the self-hosted runner.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Update, rebuild, restart
    # Deploy only a green CI run. A manual workflow_dispatch has no workflow_run
    # payload, so the first clause lets it through.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, linux, deploy]
    env:
      # Path to the deployed stack on the server. Override with a repo variable if it moves.
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/home/hp/ticket-tracker' }}
      # Published web port to health-check (matches WEB_PORT in the server .env).
      WEB_PORT: ${{ vars.WEB_PORT || '8080' }}
    steps:
      - name: Deploy (sync source, rebuild images, restart, health-check)
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"

          echo "::group::Sync working tree to origin/main"
          git fetch --prune origin main
          # reset --hard only touches TRACKED files, so untracked server-only files
          # (.env, *.bak, docker-compose.yml.orig) are preserved.
          git reset --hard origin/main
          git log --oneline -1
          echo "::endgroup::"

          echo "::group::Build changed images"
          docker compose build web api
          echo "::endgroup::"

          echo "::group::Recreate containers (db is untouched)"
          docker compose up -d
          echo "::endgroup::"

          echo "::group::Health check + status"
          curl -fsS --retry 30 --retry-delay 2 --retry-connrefused "http://localhost:${WEB_PORT}/health/ready"; echo
          docker compose ps
          echo "::endgroup::"
